<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری افرا گلد</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf2e9; text-align: center; color: #4a4a4a; margin: 0; padding: 20px; }
        .header { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px solid #ff9500; }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid #007aff; object-fit: cover; margin-bottom: 15px; background: #eee; }
        h1 { color: #ff9500; margin: 10px 0; font-size: 1.8em; }
        .section-title { background: #ff9500; color: white; padding: 5px 20px; border-radius: 10px; display: inline-block; margin: 30px 0 15px 0; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; max-width: 1000px; margin: 0 auto; }
        .gallery img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .gallery img:hover { transform: scale(1.03); }
        .btn { display: inline-block; background: #ff9500; color: white; padding: 18px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 40px; font-size: 1.1em; transition: 0.3s; box-shadow: 0 5px 20px rgba(255,149,0,0.4); }
    </style>
</head>
<body>

    <div class="header">
        <img src="Me1.jpg" alt="افرا گلد" class="profile-img">
        <h1>به گالری افرا گلد خوش آمدید</h1>
        <p>تو می‌درخشی. افرا کنارته تا شکل قشنگِ حسِ خوبت بهتر دیده شه.</p>
    </div>

    <div class="section-title">گوشواره‌ها</div>
    <div class="gallery">
        <img src="earring1.jpg"> <img src="earring2.jpg"> <img src="earring3.jpg"> 
        <img src="earring4.jpg"> <img src="earring5.jpg"> <img src="earring6.jpg"> 
        <img src="earring7.jpg"> <img src="earring8.jpg"> <img src="earring9.jpg">
    </div>

    <div class="section-title">گردنبندها</div>
    <div class="gallery">
        <img src="necklace1.jpg"> <img src="necklace2.jpg"> <img src="necklace3.jpg"> 
        <img src="necklace4.jpg"> <img src="necklace5.jpg">
    </div>

    <div class="section-title">انگشترها</div>
    <div class="gallery">
        <img src="ring1.jpg"> <img src="ring2.jpg"> <img src="ring3.jpg"> 
        <img src="ring4.jpg"> <img src="ring5.jpg"> <img src="ring6.jpg">
    </div>

    <br>
    <a href="https://ble.ir/afra85support" class="btn">✨ مشاوره و خرید در بله</a>

    <div style="margin-top: 50px; color: #aaa; font-size: 0.8em; padding-bottom: 30px;">
        Afra Gold Gallery © 2024 <br>
        طراحی شده برای علی عزیز
    </div>

</body>
</html>
